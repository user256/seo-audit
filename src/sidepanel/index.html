<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEO Audit Workbench</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>SEO Audit Workbench</h1>
        <p class="lede">Inspect the active tab. Access is granted one origin at a time.</p>
      </header>

      <section aria-labelledby="tab-heading">
        <h2 id="tab-heading">Active tab</h2>
        <dl class="facts">
          <div>
            <dt>URL</dt>
            <dd id="tab-url">Loading…</dd>
          </div>
          <div>
            <dt>Access</dt>
            <dd id="access-state">Loading…</dd>
          </div>
        </dl>
        <p id="status-message" class="status" role="status"></p>
        <div class="actions">
          <button type="button" id="allow-site" hidden>Allow this site</button>
          <button type="button" id="collect-dom" hidden>Collect DOM snapshot</button>
          <button type="button" id="refresh" class="secondary">Refresh</button>
          <button type="button" id="ping" class="secondary" hidden>Test page access</button>
          <p id="collect-summary" class="status" hidden></p>
        </div>
      </section>
    </main>
    <script type="module" src="./sidepanel.ts"></script>
  </body>
</html>
